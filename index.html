// ====== UTILIDADES ======
const COL = (n) => "₡" + Number(Math.round(n)).toLocaleString("es-CR");
const hoy = () => new Date().toISOString().slice(0,10);
const dPlus = (d) => { const x=new Date(); x.setDate(x.getDate()+d); return x.toISOString().slice(0,10); };
const esc = (s) => (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const app = document.getElementById("app");

// Estado en memoria
let STATE = { user:null, clientes:[], ventas:[], meses:[], mesActivo:null, periodo:7, tab:"inicio", detalle:null, errorCarga:null };

// ====== CARGA DE DATOS ======
// MEJORA 4: manejo de errores de red. Si algo falla, se marca errorCarga
// y la interfaz muestra un aviso en vez de mostrar todo en cero.
async function cargarTodo() {
  try {
    const [cliRes, venRes, aboRes, mesRes, gasRes] = await Promise.all([
      db.from("clientes").select("*").order("nombre"),
      db.from("ventas").select("*").order("fecha_venta", { ascending:false }),
      db.from("abonos").select("*").order("fecha"),
      db.from("meses").select("*").order("anio").order("mes"),
      db.from("gastos").select("*").order("fecha", { ascending:false }),
    ]);
    if (cliRes.error) throw cliRes.error;
    if (venRes.error) throw venRes.error;
    if (aboRes.error) throw aboRes.error;
    if (mesRes.error) throw mesRes.error;
    if (gasRes.error) throw gasRes.error;
    const cli = cliRes.data, ven = venRes.data, abo = aboRes.data;
    STATE.gastosTodos = gasRes.data || [];
    STATE.clientesRaw = cli || [];
    STATE.meses = mesRes.data || [];
    STATE.ventasTodas = ven || [];   // todas, sin filtrar (para reasignar, etc.)
    STATE.abonosTodos = abo || [];
    // Si no hay mes activo, tomar el último (más reciente)
    if (!STATE.mesActivo && STATE.meses.length) {
      STATE.mesActivo = STATE.meses[STATE.meses.length-1].id;
    }
    reconstruirClientes();
    STATE.errorCarga = null;
    return true;
  } catch (err) {
    STATE.errorCarga = err.message || "No se pudo conectar. Revisá tu internet e intentá de nuevo.";
    return false;
  }
}

// Reconstruye clientes y ventas filtrando por el mes activo.
// Separado de cargarTodo para poder recalcular al cambiar de mes sin ir a la red.
function reconstruirClientes() {
  const mid = STATE.mesActivo;
  const ven = (STATE.ventasTodas||[]).filter(v => v.mes_id===mid);
  const abo = (STATE.abonosTodos||[]).filter(a => a.mes_id===mid);
  const abonosPorCli = {};
  abo.forEach(a => { (abonosPorCli[a.cliente_id] ??= []).push(a); });
  const todosCli = STATE.clientesRaw || [];
  STATE.clientes = todosCli.map(c => ({
    ...c,
    compras: ven.filter(v => v.cliente_id===c.id && v.tipo==="credito"),
    abonos: abonosPorCli[c.id] || [],
  }));
  STATE.ventas = ven;
  STATE.gastos = (STATE.gastosTodos||[]).filter(g => g.mes_id===mid);
}

// Borrados (con confirmación)
async function borrarVenta(id, nombre) {
  if (!confirm(`¿Eliminar esta venta?\n\n${nombre}\n\nEsta acción no se puede deshacer.`)) return false;
  const { error } = await db.from("ventas").delete().eq("id", id);
  if (error) { alert("Error al eliminar: "+error.message); return false; }
  await cargarTodo();
  return true;
}
async function borrarAbono(id) {
  if (!confirm("¿Eliminar este abono?\n\nLa deuda del cliente volverá a subir por ese monto.")) return false;
  const { error } = await db.from("abonos").delete().eq("id", id);
  if (error) { alert("Error al eliminar: "+error.message); return false; }
  await cargarTodo();
  return true;
}

// Cálculos
const totalComprado = (c) => c.compras.reduce((s,x)=>s+Number(x.monto),0);
const totalAbonado  = (c) => c.abonos.reduce((s,x)=>s+Number(x.monto),0);
const deuda = (c) => totalComprado(c) - totalAbonado(c);
const proximoVence = (c) => c.compras.map(x=>x.fecha_limite).filter(Boolean).sort()[0];
// MEJORA 5: comparación de strings ISO (YYYY-MM-DD) en vez de new Date(),
// para evitar el corrimiento de un día por zona horaria.
const enRango = (f,dias) => { const lim=new Date(); lim.setDate(lim.getDate()-dias); return f >= lim.toISOString().slice(0,10); };
const vencido = (f) => f && f < hoy(); // vencido si la fecha límite es anterior a hoy

// Cuántas cuotas debieron pagarse desde la fecha de venta hasta hoy.
function cuotasVencidas(compra) {
  if (!compra.frecuencia || !compra.monto_cuota) return 0;
  const dias = { semanal:7, quincenal:15, mensual:30 }[compra.frecuencia] || 15;
  const inicio = new Date(compra.fecha_venta+"T00:00:00");
  const ahora = new Date(hoy()+"T00:00:00");
  const difDias = Math.floor((ahora - inicio) / (1000*60*60*24));
  if (difDias < dias) return 0; // aún no vence la primera cuota
  return Math.floor(difDias / dias);
}
// Cuánto DEBERÍA haber abonado un cliente a hoy según sus cuotas (tope: lo que debe en total).
function esperadoAHoy(cli) {
  let esperado = 0;
  cli.compras.forEach(c=>{
    if (c.frecuencia && c.monto_cuota) {
      esperado += cuotasVencidas(c) * Number(c.monto_cuota);
    }
  });
  return Math.min(esperado, totalComprado(cli));
}
// ¿El cliente está atrasado en sus cuotas? (abonó menos de lo que debería a hoy)
function atrasado(cli) {
  if (deuda(cli)<=0) return false;
  const conCuotas = cli.compras.some(c=>c.frecuencia && c.monto_cuota);
  if (!conCuotas) return vencido(proximoVence(cli)); // sin cuotas: usa fecha límite simple
  return totalAbonado(cli) < esperadoAHoy(cli);
}

function traduceError(m) {
  if (/Invalid login/i.test(m)) return "Correo o contraseña incorrectos.";
  if (/Email not confirmed/i.test(m)) return "El correo no está confirmado. Revisá Supabase → Authentication.";
  return m;
}

  </div>`;
  ov.onclick = () => ov.remove();

  document.getElementById("npcancelar").onclick = () => ov.remove();

    ov.remove();
    alert("✅ Contraseña actualizada. Usala la próxima vez que inicies sesión.");
  };

      const t = (parseFloat(inpB.value)||0)+(parseFloat(inpE.value)||0);
      totalDisp.textContent = COL(t);
    };
    const guardarDinero = async (campo, inp) => {
      const val = parseFloat(inp.value)||0;
      const m = mesActivoObj(); if (!m) return;
      if (Number(m[campo]||0)===val) return;
      inp.style.borderColor = "#f4c542";
      const { error } = await db.from("meses").update({ [campo]:val }).eq("id", m.id);
      if (error) { alert("Error al guardar: "+error.message); inp.style.borderColor="#dc2626"; return; }
      m[campo] = val; // actualizar en memoria
      inp.style.borderColor = "#0e5c3f";
      setTimeout(()=>{ inp.style.borderColor="#e7e5e4"; }, 700);
    };
    inpB.addEventListener("input", recalc);
    inpE.addEventListener("input", recalc);
    inpB.addEventListener("blur", ()=>guardarDinero("saldo_banco", inpB));
    inpE.addEventListener("blur", ()=>guardarDinero("saldo_efectivo", inpE));
  }
  const bIG = document.getElementById("btnIrGastos");
  if (bIG) bIG.onclick = () => { STATE.tab="gastos"; renderContent(); };
}

// MEJORA 2: exportar a CSV (respaldo). Genera dos secciones: ventas y deudas.
function exportarCSV() {
  const filas = [];
  const m = mesActivoObj();
  if (m) {
    filas.push(["=== MES: "+m.nombre+(m.cerrado?" (cerrado)":"")+" ==="]);
    filas.push(["En banco","En efectivo","Total disponible"]);
    filas.push([m.saldo_banco||0, m.saldo_efectivo||0, (Number(m.saldo_banco)||0)+(Number(m.saldo_efectivo)||0)]);
    filas.push([]);
  }
  filas.push(["=== VENTAS ==="]);
  filas.push(["Fecha","Tipo","Cliente","Producto","Monto","Fecha limite","Frecuencia","Cuota"]);
  STATE.ventas.forEach(v=>{
    const cli = v.cliente_id ? (STATE.clientes.find(k=>k.id===v.cliente_id)||{}).nombre||"" : "";
    filas.push([v.fecha_venta, v.tipo, cli, v.producto, v.monto, v.fecha_limite||"", v.frecuencia||"", v.monto_cuota||""]);
  });
  filas.push([]);
  filas.push(["=== DEUDAS ACTUALES ==="]);
  filas.push(["Cliente","Telefono","Comprado","Abonado","Debe","Utilidad","Estado"]);
  STATE.clientes.filter(c=>deuda(c)>0).forEach(c=>{
    filas.push([c.nombre, c.telefono||"", totalComprado(c), totalAbonado(c), deuda(c), c.utilidad||0, atrasado(c)?"Atrasado":"Al dia"]);
  });
  filas.push([]);
  filas.push(["=== GASTOS DEL MES ==="]);
  filas.push(["Fecha","Categoria","Monto","Nota"]);
  (STATE.gastos||[]).forEach(g=>{
    filas.push([g.fecha, g.categoria, g.monto, g.nota||""]);
  });
  // Convertir a CSV con comillas escapadas
  const csv = filas.map(fila => fila.map(campo => {
    const s = String(campo??"");
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(",")).join("\n");
  const blob = new Blob(["\ufeff"+csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `puravida-respaldo-${hoy()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Elimina un mes creado por error: borra sus ventas y abonos, y el mes.
// Solo permitido en el último mes y si no es el único que queda.
async function eliminarMes() {
  const m = mesActivoObj();
  if (!m) return;
  if (STATE.meses.length<=1) { alert("No podés eliminar el único mes que existe."); return; }
  if (STATE.meses[STATE.meses.length-1].id !== m.id) { alert("Solo se puede eliminar el mes más reciente."); return; }
  const nVentas = (STATE.ventasTodas||[]).filter(v=>v.mes_id===m.id).length;
  const nAbonos = (STATE.abonosTodos||[]).filter(a=>a.mes_id===m.id).length;
  const nGastos = (STATE.gastosTodos||[]).filter(gg=>gg.mes_id===m.id).length;
  if (!confirm(`¿Eliminar ${m.nombre}?\n\nSe borrarán ${nVentas} venta(s), ${nAbonos} abono(s) y ${nGastos} gasto(s) de este mes.\nEl mes anterior se reabrirá.\n\nEsta acción no se puede deshacer.`)) return;
  try {
    await db.from("ventas").delete().eq("mes_id", m.id);
    await db.from("abonos").delete().eq("mes_id", m.id);
    await db.from("gastos").delete().eq("mes_id", m.id);
    const { error } = await db.from("meses").delete().eq("id", m.id);
    if (error) throw error;
    // Reabrir el mes anterior
    const anterior = STATE.meses[STATE.meses.length-2];
    if (anterior) await db.from("meses").update({ cerrado:false }).eq("id", anterior.id);
    STATE.mesActivo = anterior ? anterior.id : null;
    await cargarTodo();
    if (anterior) STATE.mesActivo = anterior.id;
    reconstruirClientes();
    renderContent();
    alert(`✅ ${m.nombre} eliminado.`);
  } catch(err) {
    alert("Error al eliminar el mes: "+(err.message||err));
  }
}

// ¿El mes activo es el más reciente? Solo desde ahí se puede generar el siguiente.
function esUltimoMes() {
  if (!STATE.meses.length) return false;
  return STATE.meses[STATE.meses.length-1].id === STATE.mesActivo;
}

const NOMBRES_MES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// Crea el PRIMER mes cuando el usuario no tiene ninguno (cuenta nueva/vacía).
// Usa el mes y año actuales del teléfono.
async function crearPrimerMes() {
  const ahora = new Date();
  const anio = ahora.getFullYear();
  const mes = ahora.getMonth()+1; // getMonth es 0-based
  const nombre = `${NOMBRES_MES[mes-1]} ${anio}`;
  if (!confirm(`Se creará tu primer mes: ${nombre}.\n\n¿Continuar?`)) return;
  const b = document.getElementById("btnPrimerMes");
  if (b) { b.textContent="Creando..."; b.disabled=true; }
  try {
    const { data:nuevo, error } = await db.from("meses")
      .insert({ nombre, anio, mes }).select().single();
    if (error) throw error;
    STATE.mesActivo = nuevo.id;
    await cargarTodo();
    STATE.mesActivo = nuevo.id;
    reconstruirClientes();
    renderContent();
  } catch(err) {
    alert("Error al crear el mes: "+(err.message||err));
    if (b) { b.textContent="📅 Crear mi primer mes"; b.disabled=false; }
  }
}


// Cierra el mes actual y crea el siguiente, arrastrando los saldos pendientes.
// El arrastre se hace creando en el mes nuevo una "compra" por el saldo que
// cada cliente quedó debiendo, para que el mes nuevo arranque con esa deuda.
async function generarMesSiguiente() {
  const actual = mesActivoObj();
  if (!actual) return;
  const deudoresArrastre = STATE.clientes.filter(x=>deuda(x)>0);
  const totalArr = deudoresArrastre.reduce((s,x)=>s+deuda(x),0);
  // Calcular mes/año siguiente
  let nMes = actual.mes+1, nAnio = actual.anio;
  if (nMes>12) { nMes=1; nAnio++; }
  const nombreNuevo = `${NOMBRES_MES[nMes-1]} ${nAnio}`;
  // Evitar duplicar si ya existe
  if (STATE.meses.some(m=>m.anio===nAnio && m.mes===nMes)) {
    alert(`El mes "${nombreNuevo}" ya existe.`); return;
  }
  const msg = `Se cerrará ${actual.nombre} (quedará solo lectura) y se creará ${nombreNuevo}.\n\n`+
    (deudoresArrastre.length
      ? `${deudoresArrastre.length} cliente(s) arrastran un saldo total de ${COL(totalArr)} al mes nuevo.`
      : `No hay saldos pendientes que arrastrar.`)+
    `\n\n¿Continuar?`;
  if (!confirm(msg)) return;
  const g = document.getElementById("btnGenMes");
  if (g) { g.textContent="Generando..."; g.disabled=true; }
  try {
    // 1. Crear el mes nuevo
    const { data:nuevoMes, error:eMes } = await db.from("meses")
      .insert({ nombre:nombreNuevo, anio:nAnio, mes:nMes, saldo_banco:actual.saldo_banco||0, saldo_efectivo:actual.saldo_efectivo||0 }).select().single();
    if (eMes) throw eMes;
    // 2. Arrastrar saldos: una compra de tipo credito por el saldo pendiente
    if (deudoresArrastre.length) {
      const filas = deudoresArrastre.map(cli=>({
        cliente_id: cli.id,
        tipo: "credito",
        producto: `Saldo anterior (${actual.nombre})`,
        monto: deuda(cli),
        fecha_venta: hoy(),
        fecha_limite: dPlus(15),
        mes_id: nuevoMes.id,
      }));
      const { error:eV } = await db.from("ventas").insert(filas);
      if (eV) throw eV;
    }
    // 3. Cerrar el mes actual
    const { error:eC } = await db.from("meses").update({ cerrado:true }).eq("id", actual.id);
    if (eC) throw eC;
    // 4. Recargar y saltar al mes nuevo
    STATE.mesActivo = nuevoMes.id;
    await cargarTodo();
    STATE.mesActivo = nuevoMes.id;
    reconstruirClientes();
    renderContent();
    alert(`✅ ${nombreNuevo} creado. ${actual.nombre} quedó cerrado.`);
  } catch(err) {
    alert("Error al generar el mes: "+(err.message||err));
    if (g) { g.textContent="📅 Generar el siguiente mes"; g.disabled=false; }
  }
}

  </div>`;
  enlazarReintentar();
  enlazarMenuMeses(c);
  const gm = document.getElementById("btnGenMes");
  if (gm) gm.onclick = generarMesSiguiente;
  const dm = document.getElementById("btnDelMes");
  if (dm) dm.onclick = eliminarMes;
  const bi = document.getElementById("busca");
  bi.oninput = () => { renderFiado(c, bi.value); const x=document.getElementById("busca"); x.focus(); x.setSelectionRange(x.value.length,x.value.length); };
  c.querySelectorAll(".clirow").forEach(b=>b.onclick=()=>{ STATE.detalle=Number(b.dataset.id); renderDetalle(); });
  // Guardar utilidad al salir del campo (blur) o con Enter. No re-renderiza para no perder el foco.
  c.querySelectorAll(".utilinp").forEach(inp=>{
    const guardar = async () => {
      const id = Number(inp.dataset.id);
      const val = parseFloat(inp.value)||0;
      const cli = STATE.clientes.find(x=>x.id===id);
      if (!cli || Number(cli.utilidad||0)===val) return; // sin cambios
      inp.style.borderColor = "#f4c542";
      const { error } = await db.from("clientes").update({ utilidad:val }).eq("id", id);
      if (error) { alert("Error al guardar la utilidad: "+error.message); inp.style.borderColor="#dc2626"; return; }
      cli.utilidad = val; // actualizar en memoria sin recargar todo
      inp.style.borderColor = "#0e5c3f";
      setTimeout(()=>{ inp.style.borderColor="#e7e5e4"; }, 700);
    };
    inp.addEventListener("blur", guardar);
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){ inp.blur(); } });
    inp.addEventListener("click", e=>e.stopPropagation());
  });
}
function fmt(iso){ return new Date(iso+"T00:00:00").toLocaleDateString("es-CR",{day:"numeric",month:"short"}); }
function fmtLargo(iso){ return new Date(iso+"T00:00:00").toLocaleDateString("es-CR",{day:"numeric",month:"long"}); }

    <h3 style="font-size:18px;font-weight:800;margin-bottom:4px">Registrar abono</h3>

    <p style="font-size:14px;font-weight:700;color:#ea580c;margin-bottom:16px">Deuda actual: ${COL(saldo)}</p>
    <label class="lbl">Monto del abono</label>
    <input id="monto" class="inp" style="font-size:18px;margin-bottom:8px" type="number" inputmode="decimal" placeholder="0" />
    <p id="err" style="font-size:12px;color:#ef4444;margin-bottom:8px;display:none">El abono no puede superar la deuda.</p>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="cancelar" style="flex:1;padding:12px;border-radius:1rem;font-weight:700;color:#57534e;background:#f5f5f4;border:none">Cancelar</button>
      <button id="guardar" class="btn-primary" style="flex:1">Guardar</button>
    </div>
  </div>`;
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
  const cerrar = () => ov.remove();
  document.getElementById("atras").onclick = cerrar;
  document.getElementById("cancelar").onclick = cerrar;
  const mi = document.getElementById("monto"); mi.focus();
  document.getElementById("guardar").onclick = async () => {
    const num = parseFloat(mi.value)||0;
    if (num<=0) return;
    if (num>saldo) { document.getElementById("err").style.display="block"; return; }
    const g = document.getElementById("guardar"); g.textContent="Guardando..."; g.disabled=true;
    const { error } = await db.from("abonos").insert({ cliente_id:cli.id, monto:num, fecha:hoy(), mes_id:STATE.mesActivo });
    if (error) { alert("Error al guardar: "+error.message); g.disabled=false; g.textContent="Guardar"; return; }
    await cargarTodo();
    ov.remove();
    document.getElementById("modal")?.remove();
    renderContent();
  };
}

    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button id="ecancelar" style="flex:1;padding:12px;border-radius:1rem;font-weight:700;color:#57534e;background:#f5f5f4;border:none">Cancelar</button>
      <button id="eguardar" class="btn-primary" style="flex:1">Guardar cambios</button>
    </div>
  </div>`;
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
  document.getElementById("ecancelar").onclick = () => ov.remove();
  document.getElementById("eguardar").onclick = async () => {
    const prod = (document.getElementById("eprod").value||"").trim();
    const monto = parseFloat(document.getElementById("emonto").value)||0;
    if (!prod || monto<=0) { alert("Escribí el producto y un monto válido."); return; }
    const patch = { producto:prod, monto };
    if (esCredito) {
      const f = document.getElementById("efecha").value;
      if (f) patch.fecha_limite = f;
      const fr = document.getElementById("efrec").value;
      patch.frecuencia = fr || null;
      const cu = parseFloat(document.getElementById("ecuota").value)||0;
      patch.monto_cuota = cu || null;
    }
    const g = document.getElementById("eguardar"); g.textContent="Guardando..."; g.disabled=true;
    const { error } = await db.from("ventas").update(patch).eq("id", venta.id);
    if (error) { alert("Error al guardar: "+error.message); g.disabled=false; g.textContent="Guardar cambios"; return; }
    await cargarTodo();
    ov.remove();
    if (alGuardar) alGuardar(); else renderContent();
  };
}

// MEJORA 1: modal para EDITAR un abono.
function renderEditarAbono(abono, cli, alGuardar) {
  // saldo disponible = deuda actual + este abono (porque al editarlo, el viejo se "devuelve")
  const saldoMax = deuda(cli) + Number(abono.monto);
  const ov = document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(7,32,22,.92);display:flex;align-items:flex-end;z-index:70";
  ov.innerHTML = `
  <div style="background:#fff;width:100%;border-radius:24px 24px 0 0;padding:24px 24px 32px" onclick="event.stopPropagation()">
    <div style="width:48px;height:4px;background:#e7e5e4;border-radius:99px;margin:0 auto 16px"></div>
    <h3 style="font-size:18px;font-weight:800;margin-bottom:16px">Editar abono</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="lbl">Monto del abono (₡)</label><input id="eamonto" class="inp" type="number" inputmode="decimal" value="${abono.monto}" /></div>
      <div><label class="lbl">Fecha</label><input id="eafecha" class="inp" type="date" value="${abono.fecha}" /></div>
    </div>
    <p id="eaerr" style="font-size:12px;color:#ef4444;margin-top:8px;display:none">El abono no puede superar la deuda (máx ${COL(saldoMax)}).</p>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button id="eacancelar" style="flex:1;padding:12px;border-radius:1rem;font-weight:700;color:#57534e;background:#f5f5f4;border:none">Cancelar</button>
      <button id="eaguardar" class="btn-primary" style="flex:1">Guardar cambios</button>
    </div>
  </div>`;
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
  document.getElementById("eacancelar").onclick = () => ov.remove();
  document.getElementById("eaguardar").onclick = async () => {
    const num = parseFloat(document.getElementById("eamonto").value)||0;
    const f = document.getElementById("eafecha").value || abono.fecha;
    if (num<=0) return;
    if (num>saldoMax) { document.getElementById("eaerr").style.display="block"; return; }
    const g = document.getElementById("eaguardar"); g.textContent="Guardando..."; g.disabled=true;
    const { error } = await db.from("abonos").update({ monto:num, fecha:f }).eq("id", abono.id);
    if (error) { alert("Error al guardar: "+error.message); g.disabled=false; g.textContent="Guardar cambios"; return; }
    await cargarTodo();
    ov.remove();
    if (alGuardar) alGuardar(); else renderContent();
  };
}

// ---- NUEVA VENTA ----
function renderNueva(c) {
  // Si el mes activo está cerrado, no se puede registrar. Saltar al último mes abierto.
  if (mesCerrado()) {
    const abierto = [...STATE.meses].reverse().find(m=>!m.cerrado);
    if (abierto) { STATE.mesActivo = abierto.id; reconstruirClientes(); }
  }
  const mesDestino = mesActivoObj();
  let tipo="contado", clienteSel="nuevo", frec="quincenal", montoCuota="";
  const FREC = { semanal:{dias:7,t:"Semanal"}, quincenal:{dias:15,t:"Quincenal"}, mensual:{dias:30,t:"Mensual"} };
  const draw = () => {
    const existentes = STATE.clientes;
    c.innerHTML = `
    <div style="padding-top:20px">
      <button id="volver" style="display:flex;align-items:center;gap:4px;color:#78716c;font-size:14px;margin-bottom:12px;background:none;border:none">← Volver</button>
      <h2 style="font-size:18px;font-weight:800;margin:0 4px 4px">Nueva venta</h2>
      ${mesDestino?`<p style="font-size:12px;color:#0e5c3f;font-weight:700;margin:0 4px 16px">Se registrará en: ${esc(mesDestino.nombre)}</p>`:'<div style="margin-bottom:16px"></div>'}
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="tipobtn" data-t="contado" style="flex:1;padding:10px;border-radius:1rem;font-weight:700;font-size:14px;border:none;${tipo==='contado'?'background:#0e5c3f;color:#fff':'background:#fff;color:#78716c;border:1px solid #e7e5e4'}">Contado</button>
        <button class="tipobtn" data-t="credito" style="flex:1;padding:10px;border-radius:1rem;font-weight:700;font-size:14px;border:none;${tipo==='credito'?'background:#0e5c3f;color:#fff':'background:#fff;color:#78716c;border:1px solid #e7e5e4'}">Crédito (fiado)</button>
      </div>
      ${tipo==="credito"?`
      <div class="card" style="padding:16px;margin-bottom:12px">
        <label class="lbl">Cliente</label>
        <select id="cliSel" class="inp" style="margin-bottom:4px">
          <option value="nuevo">+ Cliente nuevo</option>
          ${existentes.map(x=>`<option value="${x.id}" ${clienteSel==String(x.id)?'selected':''}>${esc(x.nombre)} — debe ${COL(deuda(x))}</option>`).join("")}
        </select>
        ${clienteSel!=="nuevo"?`<p style="font-size:12px;color:#ea580c;margin-top:6px">Esta compra se suma a su deuda actual.</p>`:`
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:12px">
          <div><label class="lbl">Nombre del cliente</label><input id="nombre" class="inp" placeholder="María López" /></div>
          <div><label class="lbl">WhatsApp</label>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-weight:700;color:#0e5c3f;font-size:16px;padding:0 4px">🇨🇷 +506</span>
              <input id="tel" class="inp" inputmode="tel" placeholder="8888 7777" style="flex:1" />
            </div></div>
        </div>`}
      </div>`:""}
      <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:12px">
        <div><label class="lbl">Producto</label><input id="prod" class="inp" placeholder="Tenis Nike / Perfume Dior" /></div>
        <div><label class="lbl">Monto (₡)</label><input id="monto" class="inp" type="number" inputmode="decimal" placeholder="0" /></div>
        ${tipo==="credito"?`<div><label class="lbl">¿Cada cuánto paga?</label>
          <div style="display:flex;gap:8px;margin-bottom:12px">
            ${Object.entries(FREC).map(([k,o])=>`
              <button type="button" class="frecbtn" data-f="${k}" style="flex:1;padding:10px 4px;border-radius:1rem;font-weight:700;font-size:13px;border:none;${frec===k?'background:#0e5c3f;color:#fff':'background:#f5f5f4;color:#78716c'}">${o.t}</button>`).join("")}
          </div>
          <label class="lbl">¿Cuánto paga por cuota? (₡)</label>
          <input id="cuota" class="inp" type="number" inputmode="decimal" placeholder="0" value="${montoCuota}" />
          <p style="font-size:11px;color:#a8a29e;margin-top:6px">Cada ${FREC[frec].t.toLowerCase()} debería abonar esta cantidad. Si no lo hace, se marca “atrasado”.</p>
          </div>`:""}
      </div>
      <button id="guardar" class="btn-gold" style="width:100%;margin-top:16px">Guardar venta</button>
    </div>`;
    document.getElementById("volver").onclick = () => { STATE.tab="inicio"; renderContent(); };
    c.querySelectorAll(".tipobtn").forEach(b=>b.onclick=()=>{ tipo=b.dataset.t; draw(); });
    const sel = document.getElementById("cliSel");
    if (sel) sel.onchange = () => { clienteSel=sel.value; draw(); };
    c.querySelectorAll(".frecbtn").forEach(b=>b.onclick=()=>{
      const cu=document.getElementById("cuota"); if(cu) montoCuota=cu.value; // preservar lo escrito
      frec=b.dataset.f; draw();
    });
    document.getElementById("guardar").onclick = guardar;
  };
  const guardar = async () => {
    const prod = (document.getElementById("prod").value||"").trim();
    const monto = parseFloat(document.getElementById("monto").value)||0;
    if (!prod || monto<=0) { alert("Escribí el producto y un monto válido."); return; }
    const g = document.getElementById("guardar"); g.textContent="Guardando..."; g.disabled=true;
    try {
      if (tipo==="contado") {
        const { error } = await db.from("ventas").insert({ tipo:"contado", producto:prod, monto, fecha_venta:hoy(), mes_id:STATE.mesActivo });
        if (error) throw error;
      } else {
        let clienteId = clienteSel!=="nuevo" ? Number(clienteSel) : null;
        if (!clienteId) {
          let tel = (document.getElementById("tel").value||"").replace(/\D/g,"");
          if (tel.startsWith("506")) tel = tel.slice(3);
          tel = "506" + tel;
          const nombreOk = (document.getElementById("nombre").value||"").trim();
          if (!nombreOk || tel.length < 11) { alert("Poné el nombre y un número de WhatsApp válido (8 dígitos)."); g.disabled=false; g.textContent="Guardar venta"; return; }
          const { data:nuevo, error:e1 } = await db.from("clientes").insert({ nombre:nombreOk, telefono:tel }).select().single();
          if (e1) throw e1;
          clienteId = nuevo.id;
        }
        const cuotaVal = parseFloat((document.getElementById("cuota")||{}).value)||0;
        const dias = FREC[frec].dias;
        const { error:e2 } = await db.from("ventas").insert({ cliente_id:clienteId, tipo:"credito", producto:prod, monto, fecha_venta:hoy(), fecha_limite:dPlus(dias), frecuencia:frec, monto_cuota:cuotaVal||null, mes_id:STATE.mesActivo });
        if (e2) throw e2;
      }
      await cargarTodo();
      STATE.tab="inicio"; renderContent();
    } catch(err) {
      alert("Error al guardar: "+(err.message||err));
      g.disabled=false; g.textContent="Guardar venta";
    }
  };
  draw();
}

  const { data } = await db.auth.getSession();

</script>
